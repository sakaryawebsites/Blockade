<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ekonomi</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle,#1a0000,#000);
    color:white;
    text-align:center;
}

h1{
    color:#ff0033;
    text-shadow:0 0 20px red;
}

table{
    margin:auto;
}

.btn{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff0033,#660000);
    color:white;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px red;
}

.bar{
    width:120px;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar div{
    height:10px;
    width:0%;
    background:red;
    transition:0.3s;
}
</style>
</head>

<body>

<h1>💰 EKONOMİ</h1>

<div id="money">Bakiye: 0$</div>

<table>

<tr>
<td>Gümüş</td>
<td id="g0">0%</td>
<td><div class="bar"><div id="b0"></div></div></td>
<td><button class="btn" onclick="invest(0)">Yatır</button></td>
</tr>

<tr>
<td>Altın</td>
<td id="g1">0%</td>
<td><div class="bar"><div id="b1"></div></div></td>
<td><button class="btn" onclick="invest(1)">Yatır</button></td>
</tr>

<tr>
<td>Pamuk</td>
<td id="g2">0%</td>
<td><div class="bar"><div id="b2"></div></div></td>
<td><button class="btn" onclick="invest(2)">Yatır</button></td>
</tr>

<tr>
<td>Bronz</td>
<td id="g3">0%</td>
<td><div class="bar"><div id="b3"></div></div></td>
<td><button class="btn" onclick="invest(3)">Yatır</button></td>
</tr>

<tr>
<td>Beton</td>
<td id="g4">0%</td>
<td><div class="bar"><div id="b4"></div></div></td>
<td><button class="btn" onclick="invest(4)">Yatır</button></td>
</tr>

<tr>
<td>Sanayi</td>
<td id="g5">0%</td>
<td><div class="bar"><div id="b5"></div></div></td>
<td><button class="btn" onclick="invest(5)">Yatır</button></td>
</tr>

</table>

<br>
<button class="btn" onclick="location.href='menu.html'">GERİ</button>

<script>

let money=0;
let d=[0,0,0,0,0,0];

function invest(i){

money+=100;
d[i]=Math.min(100,d[i]+10);

document.getElementById("money").innerText="Bakiye: "+money+"$";

document.getElementById("b"+i).style.width=d[i]+"%";
document.getElementById("g"+i).innerText=d[i]+"%";

}

</script>

</body>
</html>
