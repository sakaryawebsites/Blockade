<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cheha Sosyalist Devleti</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:linear-gradient(-45deg,#000,#1a0000,#000,#220000);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

h1{
    font-size:45px;
    color:#ff0033;
    text-shadow:0 0 20px red;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(90deg,#ff0033,#660000);
    color:white;
    margin-top:15px;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);
    padding:25px;
    border-radius:15px;
    display:none;
    width:300px;
    border:1px solid red;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

/* PAGES */
#page2, #menuPage{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* MENU ONLY STYLE */
#menuPage{
    background:white;
    color:black;
}

/* ERROR BOX */
#errorBox{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<div id="errorBox"></div>

<!-- PAGE 1 -->
<div id="page1" class="container">
    <h1>☭ CHEHA SOSYALİST DEVLETİ</h1>
    <button class="btn" onclick="openForm()">GİRİŞ</button>
</div>

<!-- LOGIN -->
<div class="popup" id="popup">
    <h3>Giriş Yap</h3>

    <input type="text" id="isim" placeholder="İsim">
    <input type="text" id="id" placeholder="ID">

    <button class="btn" onclick="login()">Giriş</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="container">
    <div id="welcome" style="font-size:40px;color:#ff0033;"></div>
    <button class="btn" onclick="openMenu()">MENÜ</button>
</div>

<!-- MENU PAGE -->
<div id="menuPage" class="container">
    <div style="font-size:30px;">
        Yakında hazır olacak
    </div>
    <button class="btn" onclick="backHome()">Geri Dön</button>
</div>

<script>

function openForm(){
    document.getElementById("popup").style.display="block";
}

/* ERROR MESSAGE */
function showError(){
    let box=document.getElementById("errorBox");
    box.innerText="❌ Tekrar Deneyin (isim + ID)";
    box.style.display="block";

    setTimeout(()=>{
        box.style.display="none";
    },3000);
}

/* LOGIN */
function login(){

    let isim=document.getElementById("isim").value;
    let id=document.getElementById("id").value;

    let user=null;

    if(isim==="Ali" && id==="07312012") user="Ali";
    else if(isim==="Hüseyin" && id==="08732012") user="Hüseyin";
    else if(isim==="Eril" && id==="6512012") user="Eril";

    if(user){

        document.getElementById("popup").style.display="none";
        document.getElementById("page1").style.display="none";
        document.getElementById("page2").style.display="flex";

        document.getElementById("welcome").innerText =
        "Merhaba " + user + " ☭";
    }
    else{
        showError();
    }
}

/* MENU */
function openMenu(){
    document.getElementById("page2").style.display="none";
    document.getElementById("menuPage").style.display="flex";
}

function backHome(){
    document.getElementById("menuPage").style.display="none";
    document.getElementById("page2").style.display="flex";
}

</script>

</body>
</html>
