<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cheha Sosyalist Devleti</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:linear-gradient(-45deg,#000,#1a0000,#000,#220000);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.page{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    color:#ff0033;
    text-shadow:0 0 20px red;
}

.btn{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(90deg,#ff0033,#660000);
    color:white;
}

/* BACK BUTTON */
.backBtn{
    background:yellow !important;
    color:black !important;
    font-weight:bold;
}

/* LOGIN */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);
    padding:25px;
    border-radius:15px;
    display:none;
    z-index:9999;
}

input{
    width:200px;
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

/* ERROR */
#errorBox{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    display:none;
    font-weight:bold;
}

/* MENU */
#menuPage{
    background:white;
    color:black;
}

/* MAP */
.mapImg{
    width:350px;
    border-radius:15px;
}
</style>
</head>

<body>

<div id="errorBox"></div>

<!-- PAGE 1 -->
<div id="page1" class="container">
    <h1>☭ CHEHA SOSYALİST DEVLETİ</h1>
    <button class="btn" onclick="openLogin()">GİRİŞ</button>
</div>

<!-- LOGIN -->
<div class="popup" id="popup">
    <h3>Giriş</h3>
    <input id="isim" placeholder="İsim">
    <input id="id" placeholder="ID">
    <button class="btn" onclick="login()">Giriş</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <div id="welcome" style="font-size:26px;color:#ff0033;"></div>
    <button class="btn" onclick="show('menuPage')">MENÜ</button>
</div>

<!-- MENU -->
<div id="menuPage" class="page">
    <button class="btn" onclick="show('mapPage')">Harita</button>
    <button class="btn" onclick="show('peoplePage')">Kişiler</button>
    <button class="btn" onclick="show('statePage')">Devlet</button>
    <button class="btn" onclick="show('economyPage')">Ekonomi</button>
    <button class="btn" onclick="show('powerPage')">Ülke Gücü</button>
    <button class="btn" onclick="show('aiPage')">Cheha.AI</button>
    <button class="btn backBtn" onclick="show('page2')">Geri</button>
</div>

<!-- MAP -->
<div id="mapPage" class="page">
    <h3>Kıbrıs Haritası</h3>
    <img class="mapImg" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Cyprus_topographic_map-en.svg">
    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<!-- PEOPLE -->
<div id="peoplePage" class="page">
    <h2>Önemli İsimler</h2>
    <p>Hüseyin Çelebi</p>
    <p>Erke Doruk</p>
    <p>Toygar</p>
    <p>Eril</p>
    <p>Ali</p>
    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<!-- STATE -->
<div id="statePage" class="page">
    <h2>Devlet Girişi</h2>
    <input id="statePass" placeholder="Şifre">
    <button class="btn" onclick="checkState()">Giriş</button>
    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<!-- ECONOMY -->
<div id="economyPage" class="page">
    <h2>Ekonomi</h2>
    <div id="money">Bakiye: 0£</div>

    <button class="btn" onclick="invest('gumus')">Gümüş</button>
    <div id="gumusBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn" onclick="invest('altin')">Altın</button>
    <div id="altinBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn" onclick="invest('pamuk')">Pamuk</button>
    <div id="pamukBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn" onclick="invest('bronz')">Bronz</button>
    <div id="bronzBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn" onclick="invest('beton')">Beton</button>
    <div id="betonBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn" onclick="invest('sanayi')">Sanayi</button>
    <div id="sanayiBar" style="height:10px;background:lime;width:0%"></div>

    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<!-- POWER -->
<div id="powerPage" class="page">
    <h2>🏛 ÜLKE GÜCÜ</h2>
    <div>Manpower: <b>13,4M</b></div>
    <div>Sıralama: <b>162. Medeniyet</b></div>
    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<!-- AI -->
<div id="aiPage" class="page">
    <h2>🤖 Cheha.AI</h2>

    <input id="aiInput" placeholder="Sorunu yaz...">
    <button class="btn" onclick="aiAnswer()">Gönder</button>

    <div id="aiResult" style="margin-top:20px;"></div>

    <button class="btn backBtn" onclick="show('menuPage')">Geri</button>
</div>

<script>

let balance=0;

let data={
    gumus:0, altin:0, pamuk:0,
    bronz:0, beton:0, sanayi:0
};

/* LOGIN */
function openLogin(){
    document.getElementById("popup").style.display="block";
}

function login(){

    let isim=document.getElementById("isim").value.trim();
    let id=document.getElementById("id").value.trim();

    let user=null, soyad="", butce="", welcome="Merhaba ";

    if(isim==="Ali" && id==="07312012"){
        user="Ali"; soyad="Sakarya"; butce="620£";
    }
    else if(isim==="Eril" && id==="6512012"){
        user="Eril"; soyad="Şehitcan"; butce="210£";
    }
    else if(isim==="Hüseyin" && id==="08732012"){
        user="Hüseyin"; soyad="Çelebi"; butce="2000£";
        welcome="Merhaba Başkanım ";
    }
    else if(isim==="Erke" && id==="09772012"){
        user="Erke"; soyad="Doruk"; butce="0£";
    }

    if(user){
        document.getElementById("popup").style.display="none";
        document.getElementById("page1").style.display="none";
        show("page2");

        document.getElementById("welcome").innerHTML =
        welcome + user +
        "<br>Soyad: " + soyad +
        "<br>Bütçe: " + butce;
    }
    else{
        showError("❌ Tekrar Deneyin");
    }
}

/* NAV */
function show(id){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById(id).style.display="flex";
}

/* STATE */
function checkState(){
    let p=document.getElementById("statePass").value;
    if(p==="474747474") alert("✔ OK");
    else showError("❌ Hatalı");
}

/* ERROR */
function showError(msg){
    let box=document.getElementById("errorBox");
    box.innerText=msg;
    box.style.display="block";
    setTimeout(()=>box.style.display="none",3000);
}

/* ECONOMY */
function invest(type){

    let rand=Math.random();
    let change=(rand<0.7)?100:-100;

    balance+=change;

    data[type]++;
    if(data[type]>100) data[type]=100;

    document.getElementById("money").innerText="Bakiye: "+balance+"£";
    document.getElementById(type+"Bar").style.width=data[type]+"%";
}

/* AI */
function aiAnswer(){
    let q=document.getElementById("aiInput").value;
    if(!q){
        showError("❌ Soru yaz");
        return;
    }

    document.getElementById("aiResult").innerText =
    "🤖 Düşünülüyor... En yakın cevap: 5 saat sonra";
}

</script>

</body>
</html>
