<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cheha Sosyalist Devleti</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Russo+One&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:radial-gradient(circle,#1a0000,#000);
    color:white;
    overflow:hidden;
}

/* SİMGE */
.symbol{
    font-size:80px;
    color:red;
    text-shadow:0 0 25px red;
}

/* CONTAINER */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* INPUT */
input{
    width:220px;
    padding:10px;
    margin:6px;
    border-radius:10px;
    border:none;
    outline:none;
}

/* BUTON */
.btn{
    padding:12px 22px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0033,#660000);
    color:white;
    box-shadow:0 0 15px rgba(255,0,0,0.5);
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px red;
}

/* TOAST */
#toast{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    background:#00c853;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
    box-shadow:0 0 20px #00c853;
    transition:0.5s;
    z-index:9999;
}

#toast.show{
    top:20px;
}

/* ERROR */
#errorBox{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    display:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="toast"></div>
<div id="errorBox"></div>

<div class="container">

    <div class="symbol">☭</div>

    <h1>CHEHA SOSYALİST DEVLETİ</h1>

    <input id="isim" placeholder="İsim">
    <input id="id" placeholder="ID">

    <button class="btn" onclick="login()">GİRİŞ</button>

</div>

<script>

function login(){

    let i = document.getElementById("isim").value.trim();
    let id = document.getElementById("id").value.trim();

    if(!i || !id){
        showError("Lütfen tüm alanları doldur");
        return;
    }

    let user = null;

    if(i==="Ali" && id==="07312012") user="Ali";
    else if(i==="Eril" && id==="6512012") user="Eril";
    else if(i==="Hüseyin" && id==="08732012") user="Hüseyin";
    else if(i==="Erke" && id==="09772012") user="Erke";
    else if(i==="Toygar" && id==="402012") user="Toygar";

    if(user){

        showToast("☭ Merhaba " + user);

        setTimeout(()=>{
            window.location.href = "menu.html";
        },1200);

    } else {
        showError("❌ Hatalı giriş");
    }
}

/* YEŞİL BİLDİRİM */
function showToast(msg){

    let t = document.getElementById("toast");

    t.innerText = msg;
    t.classList.add("show");

    setTimeout(()=>{
        t.classList.remove("show");
    },4000);
}

/* HATA */
function showError(msg){

    let box = document.getElementById("errorBox");

    box.innerText = msg;
    box.style.display = "block";

    setTimeout(()=>{
        box.style.display = "none";
    },2000);
}

</script>

</body>
</html>
